quarkus.application.name=chat-app

casehub.chat.backend.path=chat-app.db
casehub.chat.backend.seed=demo-seed.db

quarkus.http.port=8090

quarkus.quinoa.build-dir=dist
quarkus.quinoa.package-manager-install=true
quarkus.quinoa.package-manager-install.node-version=22.16.0
quarkus.quinoa.enable-spa-routing=true

# SmallRye JWT — dev/test only: no explicit key configured, SmallRye auto-generates RSA keypair
smallrye.jwt.new-token.issuer=casehub-dev
mp.jwt.verify.issuer=casehub-dev
